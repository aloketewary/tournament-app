<!DOCTYPE html>
<html>
<head>
  <script>
    // GitHub Pages SPA redirect
    // Converts path to query param so index.html can restore it
    var path = window.location.pathname
    window.location.replace(
      window.location.origin + '/tournament-app/?p=' + encodeURIComponent(path.replace('/tournament-app', ''))
    )
  </script>
</head>
</html>
